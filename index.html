<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Multi-Cartes</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #debug {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.6); color: #0f0;
      font-family: monospace; font-size: 13px;
      padding: 8px 12px; border-radius: 6px;
      z-index: 9999; pointer-events: none;
    }
  </style>
</head>
<body>
<div id="debug">Initialisation...</div>
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: false;"
  vr-mode-ui="enabled: false"
>
  <a-assets timeout="10000">
    <video id="video1" src="montagne.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son-feuille" src="montagne-feuille.mp3" preload="auto" loop></audio>
    <audio id="son-vent"    src="montagne-vent.mp3"    preload="auto" loop></audio>
  </a-assets>

  <a-marker id="marker1" type="pattern" url="test2.patt" smooth="true" smoothCount="5">
    <a-video src="#video1" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const log = msg => document.getElementById("debug").textContent = msg;
  const video   = document.getElementById("video1");
  const feuille = document.getElementById("son-feuille");
  const vent    = document.getElementById("son-vent");
  const sons = [feuille, vent];

  let markerVisible = false;
  let keepAlive = null;

  // Force la vidéo à rester active toutes les 500ms
  function startKeepAlive() {
    stopKeepAlive();
    keepAlive = setInterval(() => {
      if (markerVisible && video.paused) {
        video.play().catch(() => {});
      }
    }, 500);
  }

  function stopKeepAlive() {
    if (keepAlive) { clearInterval(keepAlive); keepAlive = null; }
  }

  // Débloque l'audio au premier touch
  document.body.addEventListener("click", () => {
    video.play().catch(() => {});
    sons.forEach(s => s.play().then(() => s.pause()).catch(() => {}));
  }, { once: true });

  // Relance aussi si la vidéo s'arrête toute seule
  video.addEventListener("pause", () => {
    if (markerVisible) video.play().catch(() => {});
  });

  document.querySelector("a-scene").addEventListener("loaded", () => {
    log("Pret — montre le marqueur");
  });

  const marker = document.getElementById("marker1");

  marker.addEventListener("markerFound", () => {
    log("Marqueur detecte !");
    markerVisible = true;
    video.play().catch(() => {});
    sons.forEach(s => { s.currentTime = 0; s.play().catch(() => {}); });
    startKeepAlive();
  });

  marker.addEventListener("markerLost", () => {
    log("Pret — montre le marqueur");
    markerVisible = false;
    stopKeepAlive();
    video.pause(); video.currentTime = 0;
    sons.forEach(s => { s.pause(); s.currentTime = 0; });
  });
</script>
</body>
</html>

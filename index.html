<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kit Sensible</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── LANDING ── */
    #landing {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.9s ease;
    }

    #landing.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        #b8e8e0 0%, #9dd4e8 25%, #7ec9bb 50%, #a8ddd6 75%, #b4e2f0 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 14s ease infinite;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 25% 35%, rgba(255,255,255,0.4) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 80% 70%, rgba(100,190,210,0.2) 0%, transparent 60%);
      animation: breathe 9s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes breathe {
      from { opacity: 0.5; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.06); }
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) translateX(0px);  opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    .landing-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .logos {
      display: flex;
      align-items: center;
      gap: 3.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .logo-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(20,50,45,0.2);
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(10px);
    }

    .logo-sep {
      width: 1px;
      height: 36px;
      background: rgba(20,50,45,0.18);
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(3.2rem, 12vw, 9rem);
      line-height: 1;
      letter-spacing: -0.03em;
      color: #162824;
      opacity: 0;
      animation: fadeUp 1.1s ease 0.5s forwards;
    }

    .btn {
      display: inline-block;
      padding: 1rem 3rem;
      border: 1.5px solid rgba(22,40,36,0.3);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #162824;
      text-decoration: none;
      border-radius: 100px;
      cursor: pointer;
      border: 1.5px solid rgba(22,40,36,0.3);
      transition: all 0.35s ease;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .btn:hover {
      background: rgba(255,255,255,0.5);
      border-color: rgba(22,40,36,0.55);
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(50,140,125,0.18);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── AR ── */
    #debug {
      position: fixed;
      top: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-family: monospace;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 200;
      pointer-events: none;
      display: none;
    }

    a-scene {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<!-- ── LANDING PAGE ── -->
<div id="landing">
  <div class="bg"></div>
  <div class="particles" id="particles"></div>
  <div class="landing-content">
    <div class="logos">
      <img class="logo-placeholder" src="logojak.png">
      <div class="logo-sep"></div>
      <img class="logo-placeholder" src="logodnmade.png">
    </div>
    <h1>Kit Sensible</h1>
    <button class="btn" id="btnDecouvrir">Découvrir</button>
  </div>
</div>

<!-- ── DEBUG AR ── -->
<div id="debug">Initialisation...</div>

<!-- ── SCÈNE AR ── -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: false;"
  vr-mode-ui="enabled: false"
>
  <a-assets timeout="10000">
    <!-- Carte 1 -->
    <video id="video1" src="montagne.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son1a" src="montagne-feuille.mp3" preload="auto" loop></audio>
    <audio id="son1b" src="montagne-vent.mp3" preload="auto" loop></audio>
    <!-- Carte 2 -->
    <video id="video2" src="pont.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son2a" src="pont-eau.mp3" preload="auto" loop></audio>
    <audio id="son2b" src="pont-vent.mp3" preload="auto" loop></audio>
    <!-- Carte 3 -->
    <video id="video3" src="temple.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son3a" src="son2a.mp3" preload="auto" loop></audio>
    <!-- Carte 4 -->
    <video id="video4" src="chasse.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son4a" src="chasse-crepitement.mp3" preload="auto" loop></audio>
    <audio id="son4b" src="chasse-aboiements.mp3" preload="auto" loop></audio>
    <!-- Carte 5 -->
    <video id="video5" src="danse.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son5a" src="danse-footsteps.mp3" preload="auto" loop></audio>
    <audio id="son5b" src="danse-percussions.mp3" preload="auto" loop></audio>
    <!-- Carte 6 -->
    <video id="video6" src="pyro.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    <audio id="son6a" src="pyrogravure1.mp3" preload="auto" loop></audio>
    <audio id="son6b" src="pyrogravure2.mp3" preload="auto" loop></audio>
  </a-assets>

  <!-- Marqueur 1 -->
  <a-marker id="marker1" type="pattern" url="pont.patt" smooth="true" smoothCount="5">
    <a-video src="#video1" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>
  <!-- Marqueur 2 -->
  <a-marker id="marker2" type="pattern" url="montagne.patt" smooth="true" smoothCount="5">
    <a-video src="#video2" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>
  <!-- Marqueur 3 -->
  <a-marker id="marker3" type="pattern" url="temple.patt" smooth="true" smoothCount="5">
    <a-video src="#video3" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>
  <!-- Marqueur 4 -->
  <a-marker id="marker4" type="pattern" url="chasse.patt" smooth="true" smoothCount="5">
    <a-video src="#video4" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>
  <!-- Marqueur 5 -->
  <a-marker id="marker5" type="pattern" url="danse.patt" smooth="true" smoothCount="5">
    <a-video src="#video5" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>
  <!-- Marqueur 6 -->
  <a-marker id="marker6" type="pattern" url="pyro.patt" smooth="true" smoothCount="5">
    <a-video src="#video6" width="1" height="0.56" rotation="-90 0 0" position="0 0 0"></a-video>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  /* ── Particules landing ── */
  const particleContainer = document.getElementById('particles');
  const sizes = [18,24,32,40,52,64,22,36,48,28,56,20,44,30,38,26,60,34,42,50];
  sizes.forEach(size => {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.animationDuration = (10 + Math.random() * 16) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.opacity = 0;
    p.style.background = `rgba(255,255,255,${0.25 + Math.random() * 0.35})`;
    particleContainer.appendChild(p);
  });

  /* ── Bouton Découvrir ── */
  document.getElementById('btnDecouvrir').addEventListener('click', () => {
    const landing = document.getElementById('landing');
    landing.classList.add('hidden');

    // Affiche le debug AR
    document.getElementById('debug').style.display = 'block';

    // Débloque l'audio (obligatoire mobile — on profite du click utilisateur)
    cartes.forEach(c => {
      document.getElementById(c.videoId).play().catch(() => {});
      c.sonIds.forEach(id => {
        const s = document.getElementById(id);
        s.play().then(() => s.pause()).catch(() => {});
      });
    });

    // Supprime la landing du DOM après le fondu
    setTimeout(() => landing.remove(), 1000);
  });

  /* ── AR ── */
  const log = msg => document.getElementById("debug").textContent = msg;

  const cartes = [
    { markerId: "marker1", videoId: "video1", sonIds: ["son1a", "son1b"] },
    { markerId: "marker2", videoId: "video2", sonIds: ["son2a", "son2b"] },
    { markerId: "marker3", videoId: "video3", sonIds: ["son3a"] },
    { markerId: "marker4", videoId: "video4", sonIds: ["son4a", "son4b"] },
    { markerId: "marker5", videoId: "video5", sonIds: ["son5a", "son5b"] },
    { markerId: "marker6", videoId: "video6", sonIds: ["son6a", "son6b"] },
  ];

  document.querySelector("a-scene").addEventListener("loaded", () => {
    log("Pret — montre un marqueur");
  });

  cartes.forEach(carte => {
    const video = document.getElementById(carte.videoId);
    const sons  = carte.sonIds.map(id => document.getElementById(id));
    let markerVisible = false;
    let keepAlive = null;

    function startKeepAlive() {
      stopKeepAlive();
      keepAlive = setInterval(() => {
        if (markerVisible && video.paused) video.play().catch(() => {});
      }, 500);
    }

    function stopKeepAlive() {
      if (keepAlive) { clearInterval(keepAlive); keepAlive = null; }
    }

    video.addEventListener("pause", () => {
      if (markerVisible) video.play().catch(() => {});
    });

    const marker = document.getElementById(carte.markerId);

    marker.addEventListener("markerFound", () => {
      log("Marqueur detecte ! " + carte.markerId);
      markerVisible = true;
      video.play().catch(() => {});
      sons.forEach(s => { s.currentTime = 0; s.play().catch(() => {}); });
      startKeepAlive();
    });

    marker.addEventListener("markerLost", () => {
      log("Pret — montre un marqueur");
      markerVisible = false;
      stopKeepAlive();
      video.pause(); video.currentTime = 0;
      sons.forEach(s => { s.pause(); s.currentTime = 0; });
    });
  });
</script>
</body>
</html>
